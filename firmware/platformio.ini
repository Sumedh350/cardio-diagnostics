; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[env:uno]
platform  = atmelavr
board     = uno
framework = arduino

; Match firmware Serial.begin(115200)
monitor_speed = 115200

; Faster upload for iterative development
upload_speed = 115200

; -Os — size-optimise ISR code (Arduino default, stated explicitly for clarity)
; F_CPU is already defined as 16000000UL by the atmelavr board package; do not
; redefine it here or the compiler emits harmless but noisy redefinition warnings.
build_flags = -Os

; ── Timer1 dependency note ───────────────────────────────────────────────────
; The firmware drives Timer1 directly through AVR hardware registers
; (avr/io.h, avr/interrupt.h).  These headers are part of avr-libc, which is
; bundled with PlatformIO's atmelavr toolchain — NO external lib_deps entry
; is required.
;
; If you later prefer the higher-level TimerOne wrapper library, add:
;   lib_deps = paulstoffregen/TimerOne @ ^1.1.0
; and replace the timer1_init() / ISR(TIMER1_COMPA_vect) blocks with
; Timer1.initialize(125) + Timer1.attachInterrupt(myISR).
; Direct register access is kept here because it gives deterministic,
; zero-overhead ISR entry with no library abstraction in the hot path.
